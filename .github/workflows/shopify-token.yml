- name: Get Admin Access Token
  id: admin_token
  run: |
    RESPONSE=$(curl -s -X POST "https://${{ secrets.SHOPIFY_STORE }}/admin/oauth/access_token" \
      -H "Content-Type: application/x-www-form-urlencoded" \
      --data-urlencode "grant_type=client_credentials" \
      --data-urlencode "client_id=${{ secrets.SHOPIFY_CLIENT_ID }}" \
      --data-urlencode "client_secret=${{ secrets.SHOPIFY_CLIENT_SECRET }}")

    echo "Raw response:"
    echo "$RESPONSE"

    ADMIN_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')

    if [ "$ADMIN_TOKEN" = "null" ] || [ -z "$ADMIN_TOKEN" ]; then
      echo "Failed to get admin token"
      exit 1
    fi

    echo "admin_token=$ADMIN_TOKEN" >> "$GITHUB_OUTPUT"